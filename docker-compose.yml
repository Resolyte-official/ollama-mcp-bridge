services:
  mcp-host:
    container_name: mcp-host
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://host.containers.internal:11434
      - CORS_ORIGINS=*
    volumes:
      - ./mcp-config.json:/mcp-config.json
    restart: unless-stopped
    extra_hosts:
      - "host.containers.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      mcp-sandbox:
        condition: service_healthy
      mcp-external-actions:
        condition: service_healthy
      mcp-pdf-report:
        condition: service_healthy

  db:
    container_name: postgresdb
    image: pgvector/pgvector:pg18-trixie
    environment: 
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password123
      - DB_PORT=5432
    volumes:
      - pgdata:/var/lib/postgresql
      - .db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro,Z
    ports:
      -  5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=example@mail.com 
      - PGADMIN_DEFAULT_PASSWORD=postgres
    ports:
      -  5435:80
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

  mcp-sandbox:
    container_name: mcp-sandbox
    build:
      context: mcp-sandbox
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - CORS_ORIGINS=*
    restart: unless-stopped
    # Resource limits
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
      - /var/tmp
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mcp-external-actions:
    container_name: mcp-external-actions
    build:
      context: mcp-servers/external-actions-mcp
      dockerfile: Dockerfile
    expose:
      - "8090"
    environment:
      - CORS_ORIGINS=*
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8090
      - PLUNK_API_BASE_URL=https://next-api.useplunk.com/v1/send
      - PLUNK_API_KEY=sk_e224ce332a3dc3d98a59eb363ffc662324bbb9a7775a75431f1ed6b7f9c4d9cc
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8090/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  
  mcp-pdf-report:
    container_name: mcp-pdf-report
    build:
      context: mcp-servers/pdf-report-mcp
      dockerfile: Dockerfile
    expose:
      - "8091"
    environment:
      - CORS_ORIGINS=*
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8091
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8091/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
  pgadmin-data: