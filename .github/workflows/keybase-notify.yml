name: Keybase Push Alerts

on:
  push:
    branches:
      - '**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Commit Alert via Keybase Docker
        env:
          KEYBASE_USERNAME: ${{ secrets.KEYBASE_USERNAME }}
          KEYBASE_PAPERKEY: ${{ secrets.KEYBASE_PAPERKEY }}
          KEYBASE_ALLOW_ROOT: "1"
        run: |
          docker run --rm \
            -e KEYBASE_USERNAME="$KEYBASE_USERNAME" \
            -e KEYBASE_PAPERKEY="$KEYBASE_PAPERKEY" \
            -e KEYBASE_ALLOW_ROOT="$KEYBASE_ALLOW_ROOT" \
            keybaseio/client:stable \
            bash -c '
              keybase service & 
              sleep 2
              keybase oneshot
              
              # Build the multiline message cleanly using a heredoc variable
              read -r -d "" MSG << "EOF"
          **New commit pushed to** `${{ github.repository }}`

          **Author:** ${{ github.actor }}
          **Branch:** `${{ github.ref_name }}`
          **Message:** [ ${{ github.event.head_commit.message }} ]

          **Link:** ${{ github.event.head_commit.url }}
          EOF

              keybase chat send "abcdery_resolyte" --channel "github" "$MSG"
            '
